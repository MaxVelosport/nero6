# Эталонный nginx-конфиг для neurozachet.ru
#
# Как использовать на чистом сервере:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/neurozachet
#   sudo ln -s /etc/nginx/sites-available/neurozachet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d neurozachet.ru -d www.neurozachet.ru
#
# На живом сервере файл управляется Certbot:
#   /etc/nginx/sites-available/neurozachet
# — не перезаписывай его этим файлом напрямую.

server {
    listen 80;
    listen [::]:80;
    server_name neurozachet.ru www.neurozachet.ru;

    # Фронтенд — статика из сборки Vite
    root /home/deploy/projects/nero6/artifacts/solvehub/dist/public;
    index index.html;

    # Скрытые файлы не отдавать
    location ~ /\. {
        deny all;
    }

    # API → бэкенд (Docker-контейнер или PM2, порт 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50m;
    }

    # Загруженные файлы и сгенерированные изображения
    location ^~ /uploads/ {
        alias /home/deploy/data/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — все неизвестные пути → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Долгий кэш для статических ресурсов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }
}
