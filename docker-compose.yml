services:
  api:
    build: .
    container_name: nero6-api
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      # Загрузки пользователей — общая папка с хостом
      - /home/deploy/data/uploads:/app/uploads
      # Логи сервера
      - nero6-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  nero6-logs:
