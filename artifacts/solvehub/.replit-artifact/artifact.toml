kind = "web"
previewPath = "/"
title = "SolveHub"
version = "1.0.0"
id = "artifacts/solvehub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "PORT=3000 pnpm --filter @workspace/solvehub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solvehub", "run", "build" ]
publicDir = "artifacts/solvehub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
